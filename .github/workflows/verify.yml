# verify.yml
# GitHub Actions Continuous Integration (CI) Workflow
# This workflow automatically runs syntax checks and compiles the codebase on every push.

name: Code Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax Compilation Check
      run: |
        python -m py_compile setup_db.py main.py notebooks/eda_visualization.py ai_agent/ai_report_generator.py
